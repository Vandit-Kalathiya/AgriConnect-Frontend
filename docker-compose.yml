services:
  frontend:
    image: ${DOCKER_USERNAME}/agriconnect-frontend:latest
    container_name: agriconnect-frontend
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
