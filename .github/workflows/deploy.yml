name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_lint:
        description: "Skip lint step"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /home/${{ secrets.EC2_USERNAME }}/AgriConnect_Frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_lint != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2: Deploy source & build on EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    environment:
      name: production
      url: http://13.126.199.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to EC2
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ env.APP_DIR }}/

      - name: Ensure Docker is installed on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "bash -l -c '
              if ! command -v docker &>/dev/null; then
                echo \"==> Docker not found. Installing...\"
                curl -fsSL https://get.docker.com | sudo sh
                sudo usermod -aG docker \$USER
                echo \"==> Docker installed.\"
              else
                echo \"==> Docker already installed: \$(docker --version)\"
              fi
              if ! command -v docker &>/dev/null; then
                export PATH=\$PATH:/usr/bin
              fi
              docker compose version || sudo apt-get install -y docker-compose-plugin
            '"

      - name: Build Docker image & restart container
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "bash -l -s" << 'ENDSSH'
              set -e
              export PATH=$PATH:/usr/bin:/usr/local/bin
              cd ~/AgriConnect_Frontend

              echo "==> Logging in to Docker Hub (avoids pull rate limits)..."
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

              echo "==> Building Docker image..."
              docker build -t ${{ secrets.DOCKER_USERNAME }}/agriconnect-frontend:latest .

              echo "==> Logging out of Docker Hub..."
              docker logout

              echo "==> Restarting container..."
              DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d --remove-orphans

              echo "==> Pruning dangling images..."
              docker image prune -f

              echo "==> Container status:"
              DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose ps
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "bash -l -c 'sleep 5 && curl -sf http://localhost:5000/ | grep -q \"<div id=\\\"root\\\">\" && echo \"✅ App is live on port 5000.\" || (echo \"❌ Health check failed.\" && docker compose -f ~/AgriConnect_Frontend/docker-compose.yml logs --tail=50 && exit 1)'"
